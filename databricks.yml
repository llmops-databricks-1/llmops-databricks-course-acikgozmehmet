bundle:
  name: arxiv-curator

artifacts:
  default:
    type: whl
    build: uv build
    path: .

variables:
  git_sha:
    description: "Git SHA of the deployed commit"
    default: abcd
  branch:
    description: The git branch of the current commit
    default: main
  schedule_pause_status:
    description: Whether to pause schedules after deployment.
    default: PAUSED

include:
  - resources/*.yml


targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-b1b2f91a-d102.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.target}/${bundle.name}

  acc:
    workspace:
      host: https://dbc-b1b2f91a-d102.cloud.databricks.com
      root_path: /Shared/.bundle/${bundle.target}/${bundle.name}
    variables:
      schedule_pause_status: PAUSED

  prd:
    workspace:
      host: https://dbc-b1b2f91a-d102.cloud.databricks.com
      root_path: /Shared/.bundle/${bundle.target}/${bundle.name}
    variables:
      schedule_pause_status: PAUSED
